name: Cypress

on:
  pull_request:
    branches:
      - main
      - dev
    push:
      branches:
        - main
        - dev

jobs:
  cypress-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup code
        uses: actions/setup-node@v4
        with:
          node-version: 24.13.0
      
      - name: Install deps
        run: npm ci
      
      - name: Run Cypress tests
        run: npm run cypress:headless
